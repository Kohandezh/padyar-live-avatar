<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web App with Colab Backend</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }
        button {
            padding: 10px 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        .response {
            margin-top: 20px;
            padding: 10px;
            background-color: #f0f0f0;
        }
        .video-container {
            position: relative;
            width: 100%;
            height: 500px;
        }
        video {
            position: absolute;
            width: 100%;
            height: 500px;
            object-fit: cover;
            transition: opacity 0.5s ease-in-out;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Send Request to Colab Backend</h1>
        <input type="text" id="inputText" placeholder="Enter some data" />
        <button onclick="sendRequest()">Send to Colab</button>
        <div class="response" id="responseContainer"></div>
        <div class="video-container" id="container">
            <video id="video1" playsinline></video>
            <video id="video2" playsinline></video>
        </div>
    </div>

    <script>
        // const response = NaN
        let data = null;  // Define global variable
        let array = [];
        let currentIndex = 0;
        let activeVideo = 1;
        const video1 = document.getElementById("video1");
        const video2 = document.getElementById("video2");

        async function sendRequest() {
            const inputText = document.getElementById('inputText').value;
            const responseContainer = document.getElementById('responseContainer');

            // Clear previous response
            responseContainer.innerHTML = 'Processing...';
            try {
                const response = await fetch("https://9e07-35-237-7-38.ngrok-free.app/process", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({input: inputText}),
                    mode: 'cors',  // Ensures CORS headers are sent
                })
                data = await response.json();  // Parse JSON response

                await get_generated_video()
                // console.log(data);  // Output the received array
                
                // const videoBlob = await response.blob();  // ✅ Convert response to blob
                // const videoUrl = URL.createObjectURL(videoBlob);  // ✅ Create a URL for the video

                // const audioElement = document.getElementById("videoPlayer");
                // audioElement.src = videoUrl;
                // audioElement.play();  // ✅ Play the video
            } catch (error) {
                responseContainer.innerHTML = 'Error: ' + error.message;
            }
        }

        async function get_generated_video() {
            const responseContainer = document.getElementById('responseContainer');

            // Clear previous response
            responseContainer.innerHTML = 'Processing...';
            console.log(data.length)
            for (let item=0; item<data.length; item++){
                console.log(item)
                try {
                    const response = await fetch("https://9e07-35-237-7-38.ngrok-free.app/generate", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({chunk: data[item]}),
                        mode: 'cors',  // Ensures CORS headers are sent
                    })
                    // data = await response.json();  // Parse JSON response
                    // console.log(data);  // Output the received array
                    
                    const videoBlob = await response.blob();  // ✅ Convert response to blob
                    const videoUrl = URL.createObjectURL(videoBlob);  // ✅ Create a URL for the video
                    array.push(videoUrl);

                    // if (item == 1){show_video()}
                    show_video()

                    // const audioElement = document.getElementById("videoPlayer");
                    // audioElement.src = videoUrl;
                    // audioElement.play();  // ✅ Play the video
                } catch (error) {
                    responseContainer.innerHTML = 'Error: ' + error.message;
                }
            }
        }

        async function show_video() {

            function playNextVideo() {
            
                const currentVideo = activeVideo === 1 ? video1 : video2;
                const nextVideo = activeVideo === 1 ? video2 : video1;
                console.log("length of array:", array.length)

                if (currentIndex >= array.length) return;

                nextVideo.src = array[currentIndex++];
                nextVideo.load();

                nextVideo.oncanplay = () => {
                    nextVideo.play().then(() => {
                        nextVideo.style.opacity = "1";
                        setTimeout(() => {
                            currentVideo.style.opacity = "0";
                            currentVideo.pause();
                        }, 500);
                    }).catch(error => console.error("Autoplay failed:", error));
                };

                activeVideo = activeVideo === 1 ? 2 : 1;
            }

            // Start first video
            video1.src = array[currentIndex++];
            video1.play().catch(error => console.error("Autoplay failed:", error));
            video1.style.opacity = "1";

            video1.addEventListener("ended", playNextVideo);
            video2.addEventListener("ended", playNextVideo);
            document.getElementById('container').addEventListener("click", () => {
                video1.muted = false;
                video2.muted = false;
            }, { once: true });
                    
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

    </script>
</body>
</html>
